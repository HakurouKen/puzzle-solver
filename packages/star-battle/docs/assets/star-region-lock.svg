  <text class="small" x="300" y="97">某区域的候选全在第 2 行。</text>
  <text class="small" x="300" y="129">该行需要的星会由这个区域贡献。</text>
  <text class="small" x="300" y="161">同一行其他区域格可划 X。</text>
