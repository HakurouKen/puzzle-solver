<text class="label" x="84" y="145" text-anchor="middle">R</text>
<rect class="cell mark" x="110" y="114" width="52" height="52" />
<text class="label" x="136" y="145" text-anchor="middle">R</text>
<rect class="cell mark" x="162" y="114" width="52" height="52" />
