    .blocked { fill: #fee2e2; }
    .filled { fill: #111827; }
    .empty { fill: #ffffff; }
    .accent { fill: #dcfce7; }
    .line { stroke: #374151; stroke-width: 2; fill: none; }
    .dash { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 6 5; fill: none; }
  </style>

  <text class="title" x="28" y="34">区域锁定：候选都在同一行</text>
