<svg xmlns="http://www.w3.org/2000/svg" width="620" height="220" viewBox="0 0 620 220" role="img">
  <style>
    text { font-family: Inter, Arial, sans-serif; fill: #1f2937; }
    .small { font-size: 13px; }
    .label { font-size: 15px; font-weight: 600; }
    .title { font-size: 18px; font-weight: 700; }
    .cell { fill: #ffffff; stroke: #111827; stroke-width: 1.4; }
    .given { fill: #e0f2fe; }
    .mark { fill: #fef3c7; }
    .blocked { fill: #fee2e2; }
    .filled { fill: #111827; }
    .empty { fill: #ffffff; }
    .accent { fill: #dcfce7; }
    .line { stroke: #374151; stroke-width: 2; fill: none; }
    .dash { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 6 5; fill: none; }
  </style>

  <text class="title" x="28" y="34">隐藏单数：数字 5 在这一行只剩一个位置</text>
  <rect class="cell given" x="38" y="62" width="46" height="46" />
<text class="label" x="61" y="90" text-anchor="middle">8</text>
<rect class="cell " x="84" y="62" width="46" height="46" />
<rect class="cell " x="130" y="62" width="46" height="46" />
<rect class="cell given" x="176" y="62" width="46" height="46" />
<text class="label" x="199" y="90" text-anchor="middle">2</text>
<rect class="cell " x="222" y="62" width="46" height="46" />
<rect class="cell mark" x="268" y="62" width="46" height="46" />
<text class="label" x="291" y="90" text-anchor="middle">5</text>
<rect class="cell " x="314" y="62" width="46" height="46" />
<rect class="cell " x="360" y="62" width="46" height="46" />
<rect class="cell " x="406" y="62" width="46" height="46" />
  <text class="small" x="38" y="136">同一行、列、宫内排除后，5 只能落在黄色格。</text>
  <path class="line" d="M314 62 L314 108" />
  <text class="small" x="345" y="91">assign(格, 5)</text>

</svg>
